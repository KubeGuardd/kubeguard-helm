apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: watcher-service-prod
  namespace: argocd
  labels:
    app: watcher-service
    environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/KubeGuardd/kubeguard-helm
    targetRevision: main
    path: watcher-service
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeguard-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false