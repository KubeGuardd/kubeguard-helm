apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeguard-dev-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/KubeGuardd/kubeguard-helm.git
    targetRevision: main
    path: root-apps/dev/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false