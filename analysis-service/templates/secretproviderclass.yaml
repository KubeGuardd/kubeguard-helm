apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: analysis-service-kv-provider
  namespace: {{ .Values.namespace }}
spec:
  provider: azure

  secretObjects:
    - secretName: analysis-service-kv-secret
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.secretPrefix }}-NODE-ENV
          key: NODE_ENV
        - objectName: {{ .Values.keyVault.secretPrefix }}-ANALYSIS-PORT
          key: ANALYSIS_PORT
        - objectName: {{ .Values.keyVault.secretPrefix }}-MONGODB-URI
          key: MONGODB_URI
        - objectName: {{ .Values.keyVault.secretPrefix }}-INTERNAL-SECRET
          key: INTERNAL_SECRET
        - objectName: {{ .Values.keyVault.secretPrefix }}-AI-API-URL
          key: AI_API_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-AI-API-KEY
          key: AI_API_KEY
        - objectName: {{ .Values.keyVault.secretPrefix }}-AI-MODEL
          key: AI_MODEL
        - objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-STORAGE-CONNECTION-STRING
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-STORAGE-CONTAINER
          key: AZURE_STORAGE_CONTAINER
        - objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-CONNECTION-STRING
          key: SERVICE_BUS_CONNECTION_STRING
        - objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-QUEUE
          key: SERVICE_BUS_QUEUE
        - objectName: {{ .Values.keyVault.secretPrefix }}-PROJECT-SERVICE-URL
          key: PROJECT_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-WATCHER-SERVICE-URL
          key: WATCHER_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-LOG-LEVEL
          key: LOG_LEVEL
        - objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-NAME
          key: SERVICE_NAME

  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.serviceAccount.azureClientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}

    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-NODE-ENV
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-ANALYSIS-PORT
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-MONGODB-URI
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-INTERNAL-SECRET
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-AI-API-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-AI-API-KEY
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-AI-MODEL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-STORAGE-CONNECTION-STRING
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-STORAGE-CONTAINER
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-CONNECTION-STRING
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-QUEUE
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-PROJECT-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-WATCHER-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-LOG-LEVEL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-NAME
          objectType: secret