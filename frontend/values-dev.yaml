namespace: kubeguard-dev
replicaCount: 1
image:
  repository: kubeguardacr.azurecr.io/frontend
  tag: "10765a8f836a"
  pullPolicy: Always
service:
  port: 80
  targetPort: 80
serviceAccount:
  name: frontend-sa
  azureClientId: "00000000-0000-0000-0000-000000000000" # Replace with Managed Identity Client ID for dev
rollout:
  autoPromotionEnabled: true
  previewReplicaCount: 1
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
livenessProbe:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 3
readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
