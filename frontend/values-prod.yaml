namespace: kubeguard-prod
replicaCount: 2
image:
  repository: kubeguardprodcr.azurecr.io/frontend
  tag: "9307e73d401f"
  pullPolicy: Always
service:
  port: 80
  targetPort: 80
rollout:
  autoPromotionEnabled: false
  previewReplicaCount: 1
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
livenessProbe:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 3
readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
