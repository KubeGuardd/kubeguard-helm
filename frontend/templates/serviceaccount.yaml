apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    # Azure AD Workload Identity — federated credential links this SA to the Managed Identity
    # Replace azureClientId in values.yaml once the User Assigned Managed Identity is created
    azure.workload.identity/client-id: {{ .Values.serviceAccount.azureClientId | quote }}