apiVersion: v1
kind: Service
metadata:
  name: frontend-active
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    role: active
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app: frontend
    rollouts-pod-template-hash: active
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-preview
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    role: preview
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app: frontend
    rollouts-pod-template-hash: preview
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}