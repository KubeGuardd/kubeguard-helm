# NOTE: This file uses kind: Rollout (Argo Rollouts CRD), not a standard Kubernetes Deployment.
# Filename is deployment.yaml to match project folder convention.
# Argo Rollouts must be installed in the cluster before applying:
#   kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  strategy:
    blueGreen:
      # Active service receives live production traffic
      activeService: frontend-active
      # Preview service receives the new version before promotion
      previewService: frontend-preview
      previewReplicaCount: {{ .Values.rollout.previewReplicaCount }}
      # dev: auto-promotes immediately; prod: requires manual kubectl argo rollouts promote
      autoPromotionEnabled: {{ .Values.rollout.autoPromotionEnabled }}
      scaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: frontend
        # Required label for Azure AD Workload Identity token injection
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          # No env or secrets at runtime — VITE_* variables are baked into the static
          # bundle at Docker image build time via ARG/ENV in the Dockerfile.
          # Pass them in your CI pipeline as build args:
          #   --build-arg VITE_AZURE_CLIENT_ID=...
          #   --build-arg VITE_AZURE_TENANT_ID=...
          #   --build-arg VITE_AZURE_REDIRECT_URI=...
          #   --build-arg VITE_API_BASE_URL=...
          # No Key Vault CSI mount needed for the frontend.
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}