apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubeguard-project-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KubeGuardd/kubeguard-helm.git
    targetRevision: main
    path: charts/gateway
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeguard-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true