namespace: kubeguard-prod
replicaCount: 2
image:
  repository: kubeguardprodcr.azurecr.io/gateway
  tag: "v1.1.0"
  pullPolicy: IfNotPresent
containerPort: 3000
service:
  type: ClusterIP
  port: 3000
serviceAccount:
  name: gateway-sa
  azureClientId: "7d6479f5-17ac-4f10-b320-307df612c987"
keyVault:
  name: "keyvaultdemo0912"
  tenantId: "01ed7ca4-f203-43a5-956a-08329f95a438"
keyVault:
  name: keyvaultdemo0912
  tenantId: "01ed7ca4-f203-43a5-956a-08329f95a438"
  secretPrefix: PROD-GATEWAY
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
rollout:
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 300
