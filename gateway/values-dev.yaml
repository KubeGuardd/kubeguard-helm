namespace: kubeguard-dev

replicaCount: 1

image:
  repository: kubeguardacr.azurecr.io/gateway
  tag: "latest"
  pullPolicy: IfNotPresent

containerPort: 3000

service:
  type: ClusterIP
  port: 3000

serviceAccount:
  name: gateway-sa
  azureClientId: "00000000-0000-0000-0000-000000000000"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

rollout:
  autoPromotionEnabled: true
  scaleDownDelaySeconds: 30