apiVersion: v1
kind: Service
metadata:
  name: gateway-active
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
spec:
  type: {{ .Values.service.type }}
  selector:
    app: gateway
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-preview
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
spec:
  type: {{ .Values.service.type }}
  selector:
    app: gateway
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
---
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP