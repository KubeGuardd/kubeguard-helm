apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gateway-kv-provider
  namespace: {{ .Values.namespace }}
spec:
  provider: azure

  secretObjects:
    - secretName: gateway-kv-secret
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.secretPrefix }}-NODE-ENV
          key: NODE_ENV
        - objectName: {{ .Values.keyVault.secretPrefix }}-PORT
          key: GATEWAY_PORT
        - objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-TENANT-ID
          key: AZURE_TENANT_ID
        - objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-CLIENT-ID
          key: AZURE_CLIENT_ID
        - objectName: {{ .Values.keyVault.secretPrefix }}-FRONTEND-URL
          key: FRONTEND_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-PROJECT-SERVICE-URL
          key: PROJECT_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-WATCHER-SERVICE-URL
          key: WATCHER_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-ANALYSIS-SERVICE-URL
          key: ANALYSIS_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-NOTIFICATION-SERVICE-URL
          key: NOTIFICATION_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-INTERNAL-SECRET
          key: INTERNAL_SECRET
        - objectName: {{ .Values.keyVault.secretPrefix }}-LOG-LEVEL
          key: LOG_LEVEL

  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.serviceAccount.azureClientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}

    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-NODE-ENV
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-PORT
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-TENANT-ID
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-AZURE-CLIENT-ID
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-FRONTEND-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-PROJECT-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-WATCHER-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-ANALYSIS-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-NOTIFICATION-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-INTERNAL-SECRET
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-LOG-LEVEL
          objectType: secret