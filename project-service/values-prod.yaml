replicaCount: 2
image:
  repository: kubeguardprodcr.azurecr.io/project-service
  pullPolicy: Always
  tag: "v1.1.0"
namespace: kubeguard-prod
service:
  type: ClusterIP
  port: 3001
  targetPort: 3001
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
serviceAccount:
  name: project-service-sa
  azureClientId: "9435c20e-eaed-4e98-98ea-3512aa93d244"
keyVault:
  name: kubeguard-prod-kv
  tenantId: "d8537334-bc24-4daf-95a8-bf4c9fb14394"
  secretPrefix: PROD-PROJECT
rollout:
  autoPromotionEnabled: false
  previewReplicaCount: 1
probes:
  liveness:
    path: /healthz
    port: 3001
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    path: /ready
    port: 3001
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
