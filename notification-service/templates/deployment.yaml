# NOTE: This file uses kind: Rollout (Argo Rollouts CRD), not a standard Kubernetes Deployment.
# Filename is deployment.yaml to match project folder convention.
# Argo Rollouts must be installed in the cluster before applying:
#   kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notification-service
  namespace: {{ .Values.namespace }}
  labels:
    app: notification-service
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: notification-service
  strategy:
    blueGreen:
      # Active service receives live production traffic
      activeService: notification-service-active
      # Preview service receives the new version before promotion
      previewService: notification-service-preview
      previewReplicaCount: {{ .Values.rollout.previewReplicaCount }}
      # dev: auto-promotes immediately; prod: requires manual kubectl argo rollouts promote
      autoPromotionEnabled: {{ .Values.rollout.autoPromotionEnabled }}
      scaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: notification-service
        # Required label for Azure AD Workload Identity token injection
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: notification-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          # No env, configmap, or secrets defined here.
          # All secrets (SERVICE_BUS_CONNECTION_STRING, NOTIFICATION_SECRET, SENDGRID_API_KEY,
          # MONGODB_URI, INTERNAL_SECRET, FRONTEND_URL, EMAIL_FROM) are sourced from
          # Azure Key Vault via CSI driver.
          # Mount the CSI volume below once Key Vault integration is enabled in AKS.
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
      # Uncomment and configure once Key Vault CSI SecretProviderClass is created for notification-service:
      # volumes:
      #   - name: secrets-store
      #     csi:
      #       driver: secrets-store.csi.k8s.io
      #       readOnly: true
      #       volumeAttributes:
      #         secretProviderClass: notification-service-keyvault