apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: notification-service-kv-provider
  namespace: {{ .Values.namespace }}
spec:
  provider: azure

  secretObjects:
    - secretName: notification-service-kv-secret
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.secretPrefix }}-NODE-ENV
          key: NODE_ENV
        - objectName: {{ .Values.keyVault.secretPrefix }}-NOTIFICATION-PORT
          key: NOTIFICATION_PORT
        - objectName: {{ .Values.keyVault.secretPrefix }}-MONGODB-URI
          key: MONGODB_URI
        - objectName: {{ .Values.keyVault.secretPrefix }}-INTERNAL-SECRET
          key: INTERNAL_SECRET
        - objectName: {{ .Values.keyVault.secretPrefix }}-NOTIFICATION-SECRET
          key: NOTIFICATION_SECRET
        - objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-CONNECTION-STRING
          key: SERVICE_BUS_CONNECTION_STRING
        - objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-QUEUE
          key: SERVICE_BUS_QUEUE
        - objectName: {{ .Values.keyVault.secretPrefix }}-ANALYSIS-SERVICE-URL
          key: ANALYSIS_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-WATCHER-SERVICE-URL
          key: WATCHER_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-PROJECT-SERVICE-URL
          key: PROJECT_SERVICE_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-FRONTEND-URL
          key: FRONTEND_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-GATEWAY-URL
          key: GATEWAY_URL
        - objectName: {{ .Values.keyVault.secretPrefix }}-EMAIL-FROM
          key: EMAIL_FROM
        - objectName: {{ .Values.keyVault.secretPrefix }}-EMAIL-PROVIDER
          key: EMAIL_PROVIDER
        - objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-HOST
          key: SMTP_HOST
        - objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-PORT
          key: SMTP_PORT
        - objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-USER
          key: SMTP_USER
        - objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-PASSWORD
          key: SMTP_PASS
        - objectName: {{ .Values.keyVault.secretPrefix }}-ADMIN-EMAILS
          key: ADMIN_EMAILS
        - objectName: {{ .Values.keyVault.secretPrefix }}-LOG-LEVEL
          key: LOG_LEVEL
        - objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-NAME
          key: SERVICE_NAME

  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.serviceAccount.azureClientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}

    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-NODE-ENV
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-NOTIFICATION-PORT
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-MONGODB-URI
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-INTERNAL-SECRET
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-NOTIFICATION-SECRET
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-CONNECTION-STRING
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-BUS-QUEUE
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-ANALYSIS-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-WATCHER-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-PROJECT-SERVICE-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-FRONTEND-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-GATEWAY-URL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-EMAIL-FROM
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-EMAIL-PROVIDER
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-HOST
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-PORT
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-USER
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SMTP-PASSWORD
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-ADMIN-EMAILS
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-LOG-LEVEL
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secretPrefix }}-SERVICE-NAME
          objectType: secret