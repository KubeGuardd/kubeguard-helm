apiVersion: v1
kind: Service
metadata:
  name: kubeguard-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: kubeguard-gateway
    app.kubernetes.io/managed-by: helm
spec:
  type: {{ .Values.service.type }}
  selector:
    app: kubeguard-gateway
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}